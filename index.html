<!DOCTYPE html>
<html>
<head>
  <title>Porra Mundial 2026</title>
  <style>
    body { font-family: Arial; background: #f0f8ff; padding: 20px; }
    h1 { color: #006400; text-align: center; }
    .group { border: 1px solid #ccc; padding: 15px; margin: 15px 0; border-radius: 10px; background: #fff; }
    .date { width: 100%; text-align: center; font-size: 0.9em; color: #333; margin-bottom: 5px; }
    .match {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 8px 0;
      gap: 10px;
    }
    .team.home {
      display: flex;
      align-items: center;
      width: 150px;
      justify-content: flex-start;
      gap: 5px;
    }
    .team.home img { width: 24px; }
    .score { width: 50px; text-align: center; }
    .dash { width: 20px; text-align: center; font-weight: bold; }
    .team.visitor {
      display: flex;
      align-items: center;
      width: 150px;
      justify-content: flex-end;
      gap: 5px;
    }
    .team.visitor img { width: 24px; margin-left: 5px; }
    input::-webkit-inner-spin-button, input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    button { display: block; margin: 20px auto; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 8px; border: none; background: #008000; color: white; }
    button:hover { opacity: 0.8; }
    #bracket { margin-top: 25px; white-space: pre-wrap; font-family: monospace; text-align: center; }
  </style>
</head>
<body>
<h1>Porra Mundial 2026 ⚽</h1>
<input id="username" placeholder="Tu nombre" style="display:block; margin:0 auto 20px auto;">

<div id="groups"></div>

<button onclick="calculateQualified()">Calcular Clasificados → Bracket</button>
  
<div id="standings"></div>
<div id="bracket"></div>

<script>
const groups = {
"A":[{name:"México", flag:"https://flagcdn.com/w20/mx.png"},{name:"Sudáfrica", flag:"https://flagcdn.com/w20/za.png"},{name:"Corea del Sur", flag:"https://flagcdn.com/w20/kr.png"},{name:"República Checa", flag:"https://flagcdn.com/w20/cz.png"}],
"B":[{name:"Canadá", flag:"https://flagcdn.com/w20/ca.png"},{name:"Bosnia y Herzegovina", flag:"https://flagcdn.com/w20/ba.png"},{name:"Catar", flag:"https://flagcdn.com/w20/qa.png"},{name:"Suiza", flag:"https://flagcdn.com/w20/ch.png"}],
"C":[{name:"Brasil", flag:"https://flagcdn.com/w20/br.png"},{name:"Marruecos", flag:"https://flagcdn.com/w20/ma.png"},{name:"Haití", flag:"https://flagcdn.com/w20/ht.png"},{name:"Escocia", flag:"https://flagcdn.com/w20/gb-sct.png"}],
"D":[{name:"EEUU", flag:"https://flagcdn.com/w20/us.png"},{name:"Paraguay", flag:"https://flagcdn.com/w20/py.png"},{name:"Australia", flag:"https://flagcdn.com/w20/au.png"},{name:"Turquía", flag:"https://flagcdn.com/w20/tr.png"}],
"E":[{name:"Alemania", flag:"https://flagcdn.com/w20/de.png"},{name:"Curaçao", flag:"https://flagcdn.com/w20/cw.png"},{name:"Costa de Marfil", flag:"https://flagcdn.com/w20/ci.png"},{name:"Ecuador", flag:"https://flagcdn.com/w20/ec.png"}],
"F":[{name:"Países Bajos", flag:"https://flagcdn.com/w20/nl.png"},{name:"Japón", flag:"https://flagcdn.com/w20/jp.png"},{name:"Suecia", flag:"https://flagcdn.com/w20/se.png"},{name:"Túnez", flag:"https://flagcdn.com/w20/tn.png"}],
"G":[{name:"Bélgica", flag:"https://flagcdn.com/w20/be.png"},{name:"Egipto", flag:"https://flagcdn.com/w20/eg.png"},{name:"Irán", flag:"https://flagcdn.com/w20/ir.png"},{name:"Nueva Zelanda", flag:"https://flagcdn.com/w20/nz.png"}],
"H":[{name:"España", flag:"https://flagcdn.com/w20/es.png"},{name:"Cabo Verde", flag:"https://flagcdn.com/w20/cv.png"},{name:"Arabia Saudita", flag:"https://flagcdn.com/w20/sa.png"},{name:"Uruguay", flag:"https://flagcdn.com/w20/uy.png"}],
"I":[{name:"Francia", flag:"https://flagcdn.com/w20/fr.png"},{name:"Senegal", flag:"https://flagcdn.com/w20/sn.png"},{name:"Irak", flag:"https://flagcdn.com/w20/iq.png"},{name:"Noruega", flag:"https://flagcdn.com/w20/no.png"}],
"J":[{name:"Argentina", flag:"https://flagcdn.com/w20/ar.png"},{name:"Argelia", flag:"https://flagcdn.com/w20/dz.png"},{name:"Austria", flag:"https://flagcdn.com/w20/at.png"},{name:"Jordania", flag:"https://flagcdn.com/w20/jo.png"}],
"K":[{name:"Portugal", flag:"https://flagcdn.com/w20/pt.png"},{name:"República Democrática del Congo", flag:"https://flagcdn.com/w20/cd.png"},{name:"Uzbekistán", flag:"https://flagcdn.com/w20/uz.png"},{name:"Colombia", flag:"https://flagcdn.com/w20/co.png"}],
"L":[{name:"Inglaterra", flag:"https://flagcdn.com/w20/gb-eng.png"},{name:"Croacia", flag:"https://flagcdn.com/w20/hr.png"},{name:"Ghana", flag:"https://flagcdn.com/w20/gh.png"},{name:"Panamá", flag:"https://flagcdn.com/w20/pa.png"}]
};

const dates = {
  "A":["2026-06-11","2026-06-11","2026-06-18","2026-06-18","2026-06-24","2026-06-24"],
  "B":["2026-06-12","2026-06-13","2026-06-18","2026-06-18","2026-06-24","2026-06-24"],
  "C":["2026-06-13","2026-06-13","2026-06-19","2026-06-19","2026-06-24","2026-06-24"],
  "D":["2026-06-12","2026-06-13","2026-06-19","2026-06-19","2026-06-25","2026-06-25"],
  "E":["2026-06-14","2026-06-14","2026-06-20","2026-06-20","2026-06-25","2026-06-25"],
  "F":["2026-06-14","2026-06-14","2026-06-20","2026-06-20","2026-06-25","2026-06-25"],
  "G":["2026-06-15","2026-06-15","2026-06-21","2026-06-21","2026-06-26","2026-06-26"],
  "H":["2026-06-15","2026-06-15","2026-06-21","2026-06-21","2026-06-26","2026-06-26"],
  "I":["2026-06-16","2026-06-16","2026-06-22","2026-06-22","2026-06-26","2026-06-26"],
  "J":["2026-06-16","2026-06-16","2026-06-22","2026-06-22","2026-06-27","2026-06-27"],
  "K":["2026-06-17","2026-06-17","2026-06-23","2026-06-23","2026-06-27","2026-06-27"],
  "L":["2026-06-17","2026-06-17","2026-06-23","2026-06-23","2026-06-27","2026-06-27"]
};

// Generar partidos cronológicos
const matches = [];
for(const g in groups){
  const t = groups[g];
  matches.push({group:g,date:dates[g][0],home:t[0],away:t[1]});
  matches.push({group:g,date:dates[g][1],home:t[2],away:t[3]});
  matches.push({group:g,date:dates[g][2],home:t[0],away:t[2]});
  matches.push({group:g,date:dates[g][3],home:t[3],away:t[1]});
  matches.push({group:g,date:dates[g][4],home:t[3],away:t[0]});
  matches.push({group:g,date:dates[g][5],home:t[1],away:t[2]});
}
matches.sort((a,b)=>new Date(a.date)-new Date(b.date));

const container = document.getElementById("groups");
for(const g in groups){
  const div = document.createElement("div");
  div.className = "group";
  div.innerHTML = `<h2 style="text-align:center;">Grupo ${g}</h2>`;
  matches.filter(m=>m.group===g).forEach(m=>{
    const matchId = m.group+"_"+m.home.name.replace(/\s/g,'')+"_"+m.away.name.replace(/\s/g,'');
    div.innerHTML += `
      <div class="date">${m.date}</div>
      <div class="match">
        <div class="team home"><img src="${m.home.flag}">${m.home.name}</div>
        <select id="${matchId}_result" class="score">
        <option value="">-</option>
        <option value="1">1</option>
        <option value="X">X</option>
        <option value="2">2</option>
        </select>
        <div class="team visitor">${m.away.name}<img src="${m.away.flag}"></div>
      </div>
    `;
    //<input class="score" type="number" id="${matchId}_scoreA" min="0" placeholder="0">
    //<span class="dash">-</span>
    //<input class="score" type="number" id="${matchId}_scoreB" min="0" placeholder="0">
  });
  container.appendChild(div);
}

function detectTieBlocks(sorted, points){
  const blocks = [];
  let currentBlock = [sorted[0].name];

  for (let i = 1; i < sorted.length; i++) {
    const prev = sorted[i - 1].name;
    const curr = sorted[i].name;

    if (points[prev] === points[curr]) {
      currentBlock.push(curr);
    } else {
      if (currentBlock.length > 1) blocks.push([...currentBlock]);
      currentBlock = [curr];
    }
  }

  if (currentBlock.length > 1) blocks.push([...currentBlock]);

  return blocks;
}


let standingsBeforeTiebreak = {};
let pointsBeforeTiebreak = {};

function calculateQualified(){
  saveUserBet();  // descarga CSV + guarda local

  const standingsOutput = {};
  const matchesByGroup = {};
  const tiedGroups = {};

  matches.forEach(m => {
    if (!matchesByGroup[m.group]) matchesByGroup[m.group] = [];
    matchesByGroup[m.group].push(m);
  });

  // 1. Calcular puntos y clasificaciones
  for(const g in groups){
    const teams = groups[g];
    const points = {};
    teams.forEach(t => points[t.name] = 0);

    matchesByGroup[g].forEach(m => {
      const id = m.group + "_" +
        m.home.name.replace(/\s/g,'') + "_" +
        m.away.name.replace(/\s/g,'');

      const res = document.getElementById(id + "_result").value || "-";

      if(res === "1") points[m.home.name] += 3;
      else if(res === "2") points[m.away.name] += 3;
      else if(res === "X"){
        points[m.home.name] += 1;
        points[m.away.name] += 1;
      }
    });

    const sorted = teams.slice().sort((a,b)=> points[b.name] - points[a.name]);

    standingsOutput[g] = sorted.map((t,i)=>({
      pos: i+1,
      name: t.name,
      pts: points[t.name]
    }));

    pointsBeforeTiebreak[g] = points;

    // 2. Detectar empates SOLO entre vecinos
    const ties = [];
    for(let i=0;i<sorted.length-1;i++){
      const A = sorted[i], B = sorted[i+1];
      if(points[A.name] === points[B.name]){
        ties.push([A.name, B.name]);
      }
    }

    if(ties.length > 0){
      tiedGroups[g] = ties;
    }
  }

  standingsBeforeTiebreak = standingsOutput;

  // 3. Mostrar clasificación y pasar al UI de desempates
  showStandings(standingsOutput);
  showTiebreakUI(tiedGroups);
}


 function applyTiebreaks(){
  let finalStandings = JSON.parse(JSON.stringify(standingsBeforeTiebreak));

  for (const g in finalStandings) {
    const arr = finalStandings[g];
    const tieBlocks = detectTieBlocks(arr, pointsBeforeTiebreak[g]);

    tieBlocks.forEach((block, index) => {

      // Empate entre 2 equipos
      if (block.length === 2) {
        const id = `tiebreak_${g}_${index}`;
        const winner = document.getElementById(id).value;
        const loser = block.find(t => t !== winner);

        arr.sort((a,b)=>{
          if(a.name === winner) return -1;
          if(b.name === winner) return 1;
          if(a.name === loser) return -1;
          if(b.name === loser) return 1;
          return 0;
        });
      }

      // Empate de 3 o 4 equipos
      else {
        const chosenOrder = [];

        for (let pos = 0; pos < block.length; pos++) {
          const id = `tiebreak_${g}_${index}_${pos}`;
          const selected = document.getElementById(id).value;

          if (!selected) {
            alert(`Faltan posiciones por definir en el empate múltiple del Grupo ${g}`);
            return;
          }

          chosenOrder.push(selected);
        }

        // Reordenar bloque
        const newOrder = chosenOrder.map(name =>
          arr.find(t => t.name === name)
        );

        // Reemplazar por nueva ordenación
        const others = arr.filter(t => !block.includes(t.name));

        arr.splice(0, arr.length, ...newOrder.concat(others));
      }
    });

    // Reasignar posiciones numéricas
    arr.forEach((t,i)=> t.pos = i+1);
  }

  // Mostrar clasificación final
  showStandings(finalStandings);

  // Clasificados y bracket
  const qualified = [];
  const thirds = [];

  for(const g in finalStandings){
    const arr = finalStandings[g];
    qualified.push(arr[0].name, arr[1].name);
    thirds.push({ name: arr[2].name, pts: arr[2].pts });
  }

  thirds.sort((a,b)=> b.pts - a.pts);
  const top8 = thirds.slice(0,8).map(t => t.name);

  displayBracket(qualified.concat(top8));
}



 function showTiebreakUI(tiedGroups){
  let html = "<h2>Desempates necesarios</h2>";
  let found = false;

  for (const g in tiedGroups) {
    found = true;
    html += `<h3>Grupo ${g}</h3>`;

    tiedGroups[g].forEach((block, idx) => {

      if (block.length === 2) {
        // Empate sencillo entre 2
        const id = `tiebreak_${g}_${idx}`;

        html += `
          <p>${block[0]} y ${block[1]} han empatado a puntos.</p>
          <p>¿Quién queda por encima?</p>
          <select id="${id}">
            <option value="${block[0]}">${block[0]}</option>
            <option value="${block[1]}">${block[1]}</option>
          </select>
          <br><br>
        `;
      } else {
        // Empate múltiple de 3 o 4
        html += `
          <p>Empate múltiple entre: <b>${block.join(", ")}</b></p>
          <p>Define el orden completo:</p>
        `;

        block.forEach((team, pos) => {
          const id = `tiebreak_${g}_${idx}_${pos}`;
          html += `
            <div>
              Posición ${pos + 1}:
              <select class="tie-select" id="${id}">
                <option value="">-</option>
                ${block.map(t => `<option value="${t}">${t}</option>`).join("")}
              </select>
            </div>
          `;
        });

        html += "<br>";
      }
    });
  }

  if (found) {
    html += `<button onclick="applyTiebreaks()">Realizar desempates</button>`;
  } else {
    html += "<p>No hay empates. Mostrando clasificados directamente.</p>";
    applyTiebreaks();
  }

  document.getElementById("bracket").innerHTML = html;

  // Para evitar selecciones duplicadas SOLO se activa en empates de 3+
  enforceUniqueOrder();
}


function enforceUniqueOrder(){
  document.querySelectorAll(".tie-select").forEach(sel => {
    sel.addEventListener("change", () => {
      const siblings = Array.from(sel.parentNode.parentNode.querySelectorAll(".tie-select"));

      const values = siblings.map(s => s.value);
      const duplicates = values.filter((v,i) => v && values.indexOf(v) !== i);

      if(duplicates.length > 0){
        // limpiar la selección repetida
        sel.value = "";
        alert("Cada equipo solo puede aparecer una vez en el orden.");
      }
    });
  });
}


  function saveUserBet(){
  const username = document.getElementById("username").value.trim();
  if(!username){
    alert("Introduce tu nombre antes de calcular la porra.");
    return;
  }

  const data = [];

  matches.forEach(m=>{
    const id = m.group + "_" +
      m.home.name.replace(/\s/g,'') + "_" +
      m.away.name.replace(/\s/g,'');

    const res = document.getElementById(id + "_result").value || "-";

    data.push({
      user: username,
      group: m.group,
      date: m.date,
      home: m.home.name,
      away: m.away.name,
      result: res
    });
  });

  // Guardar localmente (opcional pero útil)
  localStorage.setItem("porra_" + username, JSON.stringify(data));

  // Crear CSV
  const header = "user;group;date;home;away;result";
  const lines = data.map(r =>
    `${r.user};${r.group};${r.date};${r.home};${r.away};${r.result}`
  );
  const csv = [header, ...lines].join("\n");
  const BOM = "\uFEFF";
  const csvWithBOM = BOM + csv;
  // Descargar archivo automáticamente
  const blob = new Blob([csvWithBOM],{ type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "porra_" + username + ".csv";
  a.click();
  URL.revokeObjectURL(url);
}

// Mostrar tabla completa por grupo
function showStandings(standings){
  let html = "<h2>Clasificación por Grupos</h2>";
  for(const g in standings){
    html += `<h3>Grupo ${g}</h3>`;
    html += `
      <table border="1" cellpadding="5" style="margin-bottom:10px;">
        <tr><th>Pos</th><th>Equipo</th><th>Puntos</th></tr>
        ${standings[g].map(t => `
          <tr>
            <td>${t.pos}</td>
            <td>${t.name}</td>
            <td>${t.pts}</td>
          </tr>
        `).join("")}
      </table>
    `;
  }

  document.getElementById("standings").innerHTML = html;
}

function displayBracket(arr){
  document.getElementById("bracket").innerHTML =
    "<h2>32 Clasificados → Bracket de Eliminación</h2><pre>" +
    JSON.stringify(arr, null, 2) +
    "</pre>";
}

</script>

</html>
