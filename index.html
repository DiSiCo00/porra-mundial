function detectTieBlocks(sorted, points) {
  const blocks = [];
  let block = [sorted[0].name];

  for (let i = 1; i < sorted.length; i++) {
    const prev = sorted[i - 1].name;
    const curr = sorted[i].name;

    if (points[prev] === points[curr]) {
      block.push(curr);
    } else {
      if (block.length > 1) blocks.push([...block]);
      block = [curr];
    }
  }

  if (block.length > 1) blocks.push([...block]);
  return blocks;
}


let standingsBeforeTiebreak = {};
let pointsBeforeTiebreak = {};

function calculateQualified(){
  saveUserBet();  // descarga CSV + guarda local

  const standingsOutput = {};
  const matchesByGroup = {};
  const tiedGroups = {};

  matches.forEach(m => {
    if (!matchesByGroup[m.group]) matchesByGroup[m.group] = [];
    matchesByGroup[m.group].push(m);
  });

  // 1. Calcular puntos y clasificaciones
  for(const g in groups){
    const teams = groups[g];
    const points = {};
    teams.forEach(t => points[t.name] = 0);

    matchesByGroup[g].forEach(m => {
      const id = m.group + "_" +
        m.home.name.replace(/\s/g,'') + "_" +
        m.away.name.replace(/\s/g,'');

      const res = document.getElementById(id + "_result").value || "-";

      if(res === "1") points[m.home.name] += 3;
      else if(res === "2") points[m.away.name] += 3;
      else if(res === "X"){
        points[m.home.name] += 1;
        points[m.away.name] += 1;
      }
    });

    const sorted = teams.slice().sort((a,b)=> points[b.name] - points[a.name]);

    standingsOutput[g] = sorted.map((t,i)=>({
      pos: i+1,
      name: t.name,
      pts: points[t.name]
    }));

    pointsBeforeTiebreak[g] = points;

    // 2. Detectar bloques completos de empate
const blocks = detectTieBlocks(sorted, points);
tiedGroups[g] = blocks;

  }

  standingsBeforeTiebreak = standingsOutput;

  // 3. Mostrar clasificación y pasar al UI de desempates
  showStandings(standingsOutput);
  showTiebreakUI(tiedGroups);
}


 function applyTiebreaks() {

          if (a.name === winner) return -1;
          if (b.name === winner) return 1;
          if (a.name === loser) return -1;
          if (b.name === loser) return 1;
          return 0;
        });

          order.push(sel);
        }

        const newOrder = order.map(name => arr.find(t => t.name === name));
        const others  = arr.filter(t => !block.includes(t.name));

        arr.splice(0, arr.length, ...newOrder.concat(others));
      }

    });

    arr.forEach((t, i) => t.pos = i + 1);
  }

  showStandings(final);

const direct = [];

for(const g in final){

}

// guardamos global para la parte del corte
window.directQualified = direct;
window.thirdsBeforeCut = thirds;

// ordenamos
thirds.sort((a,b)=> b.pts - a.pts);

// detectar bloque de corte
const block = detectCutBlock(thirds);

if(block.length > 1){

function detectCutBlock(sortedThirds){
  const cutoffPoints = sortedThirds[7].pts; // puntos del 8º

  // seleccionamos todos los que tengan los mismos puntos que el 8º
  const block = sortedThirds
    .filter(t => t.pts === cutoffPoints)
    .map(t => t.name);

  // si sólo hay uno → no hay empate en el corte
  return block.length > 1 ? block : [];
}

  function showThirdPlaceTiebreakUI(block){
  let html = `<h2>Desempate entre Terceros</h2>
              <p>Estos equipos han empatado por las últimas plazas de clasificación:</p>
              <b>${block.join(", ")}</b><br><br>`;

  if(block.length === 2){
    html += `
      <p>¿Quién queda por encima?</p>
      <select id="third_cut_0">
        <option value="${block[0]}">${block[0]}</option>
        <option value="${block[1]}">${block[1]}</option>
      </select>
      <br><br>
    `;
  } else {
    html += `<p>Define el orden entre ellos:</p>`;
    
    block.forEach((team,pos)=>{
      const id = `third_cut_${pos}`;
      html += `
        Posición ${pos+1}:
        <select class="third-tie" id="${id}">
          <option value="">-</option>
          ${block.map(t => `<option value="${t}">${t}</option>`).join("")}
        </select>
        <br>
      `;
    });
  }

  html += `<button onclick="applyThirdCutTiebreak('${block.join("|")}')">Resolver desempate</button>`;

  document.getElementById("bracket").innerHTML = html;

  enforceThirdUnique(); // evita duplicados
}

function applyThirdCutTiebreak(blockStr){
  const block = blockStr.split("|");

  let finalOrder = [];

  if(block.length === 2){
    const winner = document.getElementById("third_cut_0").value;
    const loser  = block.find(t => t !== winner);
    finalOrder = [winner, loser];

  } else {
    for(let i=0; i<block.length; i++){
      const sel = document.getElementById("third_cut_"+i).value;
      if(!sel){ alert("Faltan posiciones por definir."); return; }
      finalOrder.push(sel);
    }
  }

  // reconstruimos los TOP 8 ya con desempate aplicado
  const sorted = window.thirdsBeforeCut.slice(); // copia original

  // filtramos los que no estaban en el bloque
  const others = sorted.filter(t => !block.includes(t.name));

  // insertamos el nuevo orden del bloque en la parte superior del bloque
  const newThirds = [];

  sorted.forEach(t => {
    if(!block.includes(t.name)){
      newThirds.push(t); // los que no estaban empatados se mantienen
    }
  });

  // sustituimos los valores empatados
  finalOrder.forEach(name=>{
    const obj = sorted.find(t => t.name === name);
    newThirds.push(obj);
  });

  // reordenamos de nuevo por puntos, pero con orden dentro del bloque ahora fijo
  newThirds.sort((a,b)=>{
    if(a.pts !== b.pts) return b.pts - a.pts;
    // si empatan en puntos, su orden queda por el orden original (corregido por desempate)
    return 0;
  });

  // guardamos los ocho mejores
  const top8 = newThirds.slice(0,8).map(t => t.name);

  // fin → mostrar bracket final
  displayBracket(window.directQualified.concat(top8));
}


 function showTiebreakUI(tiedBlocksByGroup) {
  let html = "<h2>Desempates necesarios</h2>";
  let hasTies = false;

  for (const g in tiedBlocksByGroup) {
    const blocks = tiedBlocksByGroup[g];
    if (blocks.length === 0) continue;

    hasTies = true;

    html += `<h3>Grupo ${g}</h3>`;

    blocks.forEach((block, bIndex) => {

      if (block.length === 2) {
        // EMPATE DE 2
        const id = `tiebreak_${g}_${bIndex}`;

        html += `
          <p>${block[0]} y ${block[1]} han empatado.</p>
          <p>¿Quién queda por encima?</p>
          <select id="${id}">
            <option value="${block[0]}">${block[0]}</option>
            <option value="${block[1]}">${block[1]}</option>
          </select>
          <br><br>
        `;

      } else {
        // EMPATES DE 3 O 4
        html += `
          <p>Han empatado: <b>${block.join(", ")}</b></p>
          <p>Define el orden completo:</p>
        `;

        block.forEach((team, pos) => {
          const id = `tiebreak_${g}_${bIndex}_${pos}`;
          html += `
            <div>
              Posición ${pos + 1}:
              <select class="tie-select" id="${id}">
                <option value="">-</option>
                ${block.map(t => `<option value="${t}">${t}</option>`).join("")}
              </select>
            </div>
          `;
        });

        html += "<br>";
      }
    });
  }

  if (hasTies) {
    html += `<button onclick="applyTiebreaks()">Realizar desempates</button>`;
  } else {
    html += "<p>No hay empates. Mostrando clasificados...</p>";
    applyTiebreaks();
  }

  document.getElementById("bracket").innerHTML = html;

  enforceUniqueOrder(); // evita duplicados en empates 3-4
}



function enforceUniqueOrder(){
  const selects = document.querySelectorAll(".tie-select");
  selects.forEach(s => s.addEventListener("change", () => {
    const parent = s.parentNode.parentNode;
    const all = parent.querySelectorAll(".tie-select");

    const values = [...all].map(x => x.value).filter(v => v !== "");
    const duplicates = values.filter((v, i) => values.indexOf(v) !== i);

    if (duplicates.length) {
      alert("Cada equipo debe aparecer solo una vez.");
      s.value = "";
    }
  }));
}


  function saveUserBet(){
  const username = document.getElementById("username").value.trim();
  if(!username){
    alert("Introduce tu nombre antes de calcular la porra.");
    return;
  }

  const data = [];

  matches.forEach(m=>{
    const id = m.group + "_" +
      m.home.name.replace(/\s/g,'') + "_" +
      m.away.name.replace(/\s/g,'');

    const res = document.getElementById(id + "_result").value || "-";

    data.push({
      user: username,
      group: m.group,
      date: m.date,
      home: m.home.name,
      away: m.away.name,
      result: res
    });
  });

  // Guardar localmente (opcional pero útil)
  localStorage.setItem("porra_" + username, JSON.stringify(data));

  // Crear CSV
  const header = "user;group;date;home;away;result";
  const lines = data.map(r =>
    `${r.user};${r.group};${r.date};${r.home};${r.away};${r.result}`
  );
  const csv = [header, ...lines].join("\n");
  const BOM = "\uFEFF";
  const csvWithBOM = BOM + csv;
  // Descargar archivo automáticamente
  const blob = new Blob([csvWithBOM],{ type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "porra_" + username + ".csv";
  a.click();
  URL.revokeObjectURL(url);
}

// Mostrar tabla completa por grupo
function showStandings(standings){
  let html = "<h2>Clasificación por Grupos</h2>";
  for(const g in standings){
    html += `<h3>Grupo ${g}</h3>`;
    html += `
      <table border="1" cellpadding="5" style="margin-bottom:10px;">
        <tr><th>Pos</th><th>Equipo</th><th>Puntos</th></tr>
        ${standings[g].map(t => `
          <tr>
            <td>${t.pos}</td>
            <td>${t.name}</td>
            <td>${t.pts}</td>
          </tr>
        `).join("")}
      </table>
    `;
  }

  document.getElementById("standings").innerHTML = html;
}

function displayBracket(arr){
  document.getElementById("bracket").innerHTML =
    "<h2>32 Clasificados → Bracket de Eliminación</h2><pre>" +
    JSON.stringify(arr, null, 2) +
    "</pre>";
}
