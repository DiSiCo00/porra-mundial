const matches = [];

/* ─────────────────────────────────────────────
   3) FUNCIONES DE CSV
────────────────────────────────────────────── */

function saveUserBet(){
  const username = document.getElementById("username").value.trim();
  if(!username){ alert("Introduce tu nombre."); return; }

  const data=[];
  matches.forEach(m=>{
    const id = m.group+"_"+m.home.name.replace(/\s/g,'')+"_"+m.away.name.replace(/\s/g,'');
    const res = document.getElementById(id+"_result").value || "-";
    data.push({
      user:username,
      group:m.group,
      date:m.date,
      home:m.home.name,
      away:m.away.name,
      result:res
    });
  });

  localStorage.setItem("porra_"+username,JSON.stringify(data));

  const header = "user;group;date;home;away;result";
  const lines = data.map(r=>`${r.user};${r.group};${r.date};${r.home};${r.away};${r.result}`);
  const csv = "\uFEFF" + [header,...lines].join("\n");

  const blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="porra_"+username+".csv"; a.click();
  URL.revokeObjectURL(url);
}

/* ─────────────────────────────────────────────
   4) CLASIFICACIÓN INICIAL POR GRUPOS
────────────────────────────────────────────── */

let standingsBeforeTiebreak = {};
let pointsBeforeTiebreak = {};

function calculateQualified(){
  saveUserBet();

  const standingsOutput = {};
  const matchesByGroup = {};
  const tiedGroups = {};

  matches.forEach(m=>{
    if(!matchesByGroup[m.group]) matchesByGroup[m.group]=[];
    matchesByGroup[m.group].push(m);
  });

  for(const g in groups){
    const teams = groups[g];
    const points={};
    teams.forEach(t=>points[t.name]=0);

    matchesByGroup[g].forEach(m=>{
      const id=m.group+"_"+m.home.name.replace(/\s/g,'')+"_"+m.away.name.replace(/\s/g,'');
      const r=document.getElementById(id+"_result").value;

      if(r==="1") points[m.home.name]+=3;
      else if(r==="2") points[m.away.name]+=3;
      else if(r==="X"){ points[m.home.name]++; points[m.away.name]++; }
    });

    const sorted = teams.slice().sort((a,b)=> points[b.name]-points[a.name]);

    standingsOutput[g] = sorted.map((t,i)=>({
      pos:i+1,
      name:t.name,
      pts:points[t.name]
    }));

    pointsBeforeTiebreak[g] = points;

    // DETECCIÓN CORRECTA DE BLOQUES
    tiedGroups[g] = detectTieBlocks(sorted,points);
  }

  standingsBeforeTiebreak = standingsOutput;

  showStandings(standingsOutput);
  showTiebreakUI(tiedGroups);
}

/* ─────────────────────────────────────────────
   5) DETECTAR BLOQUES DE EMPATE EN GRUPOS
────────────────────────────────────────────── */

function detectTieBlocks(sorted, points){
  const blocks = [];
  let start = 0;

  for(let i=1;i<sorted.length;i++){
    const prev = sorted[i-1].name;
    const curr = sorted[i].name;

    if(points[prev] !== points[curr]){
      if(i-1 > start){ // hubo bloque de tamaño >=2
        const names = sorted.slice(start, i).map(t => t.name);
        blocks.push({ names, startIndex: start, endIndex: i-1 });
      }
      start = i;
    }
  }
  // cerrar bloque final si aplica
  if(sorted.length-1 > start){
    const names = sorted.slice(start, sorted.length).map(t => t.name);
    blocks.push({ names, startIndex: start, endIndex: sorted.length-1 });
  }

  return blocks;
}


/* ─────────────────────────────────────────────
   6) UI DE DESEMPATES POR GRUPO
────────────────────────────────────────────── */

function showTiebreakUI(tiedGroups){
  let html="<h2>Desempates de Grupos</h2>";
  let has=false;

  for(const g in tiedGroups){
    if(!tiedGroups[g] || tiedGroups[g].length===0) continue;

    has=true;
    html+=`<h3>Grupo ${g}</h3>`;

    tiedGroups[g].forEach((block,i)=>{
      if(block.length===2){
        const id=`tiebreak_${g}_${i}`;
        html+=`
          <p>${block[0]} y ${block[1]} han empatado.</p>
          ¿Quién queda por encima?<br>
          <select id="${id}">
            <option value="${block[0]}">${block[0]}</option>
            <option value="${block[1]}">${block[1]}</option>
          </select><br><br>
        `;
      } else {
        html+=`<p>Han empatado: <b>${block.join(", ")}</b></p><p>Define el orden:</p>`;
        block.forEach((t,pos)=>{
          const id=`tiebreak_${g}_${i}_${pos}`;
          html+=`
            Posición ${pos+1}:
            <select class="tie-select" id="${id}">
              <option value="">-</option>
              ${block.map(x=>`<option value="${x}">${x}</option>`).join("")}
            </select><br>
          `;
        });
        html+="<br>";
      }
    });
  }

  if(has){
    html+=`<button onclick="applyGroupTiebreaks()">Resolver Desempates de Grupos</button>`;
  } else {
    html+="<p>No hay desempates. Procediendo...</p>";
    applyGroupTiebreaks();
  }

  document.getElementById("bracket").innerHTML=html;
  enforceUniqueOrder();
}

/* ─────────────────────────────────────────────
   7) APLICAR DESEMPATE DE GRUPOS
────────────────────────────────────────────── */

function applyGroupTiebreaks(){
  let final = JSON.parse(JSON.stringify(standingsBeforeTiebreak));

  for(const g in final){
    const arr = final[g];
    const blocks = detectTieBlocks(arr, pointsBeforeTiebreak[g]); // ahora devuelve {names,startIndex,endIndex}

    blocks.forEach((block, i) => {
      const { names, startIndex, endIndex } = block;

      // construir el nuevo orden SOLO para el segmento [startIndex..endIndex]
      let newSegment = [];

      if(names.length === 2){
        const id = `tiebreak_${g}_${i}`;
        const winner = document.getElementById(id)?.value;
        if(!winner){ alert(`Falta elegir ganador en el Grupo ${g}`); throw new Error("tiebreak missing"); }
        const loser = names.find(n => n !== winner);

        // mapear a objetos standings manteniendo sus puntos ya calculados
        const winnerObj = arr.slice(startIndex, endIndex+1).find(t => t.name === winner);
        const loserObj  = arr.slice(startIndex, endIndex+1).find(t => t.name === loser);
        newSegment = [winnerObj, loserObj];

      } else {
        // 3 o 4 equipos: leer el orden completo
        const chosen = [];
        for(let pos=0; pos<names.length; pos++){
          const id = `tiebreak_${g}_${i}_${pos}`;
          const sel = document.getElementById(id)?.value;
          if(!sel){ alert(`Faltan posiciones por definir en el Grupo ${g}`); throw new Error("tiebreak missing"); }
          if(chosen.includes(sel)){ alert("Cada equipo solo puede aparecer una vez."); throw new Error("duplicate"); }
          chosen.push(sel);
        }
        const segmentObjs = arr.slice(startIndex, endIndex+1);
        newSegment = chosen.map(name => segmentObjs.find(t => t.name === name));
      }

      // reconstruir el array final del grupo SIN tocar lo demás
      const before = arr.slice(0, startIndex);
      const after  = arr.slice(endIndex+1);
      const rebuilt = before.concat(newSegment, after);

      // escribir de vuelta en arr (mantener referencia original)
      arr.splice(0, arr.length, ...rebuilt);
    });

    // reasignar posiciones numeradas al final
    arr.forEach((t, idx) => t.pos = idx + 1);
  }

  // mostrar tabla final tras desempates de grupo
  showStandings(final);

  // continuar con terceros y posible desempate del corte
  handleThirdPlaces(final);
}


/* ─────────────────────────────────────────────
   8) MANEJO DE LOS TERCEROS Y SU EMPATE DE CORTE
────────────────────────────────────────────── */

function handleThirdPlaces(final){
  const direct=[];
  const thirds=[];

  for(const g in final){
    direct.push(final[g][0].name,final[g][1].name);
    thirds.push({name:final[g][2].name, pts:final[g][2].pts});
  }

  window.directQualified = direct;
  window.thirdsBeforeCut = thirds.slice();

  thirds.sort((a,b)=> b.pts - a.pts);

  const block = detectCutBlock(thirds);

  if(block.length>1){
    showThirdPlaceTiebreakUI(block);
    return;
  }

  const top8 = thirds.slice(0,8).map(t=>t.name);
  displayBracket(direct.concat(top8));
}

/* BLOQUE PARA DETECTAR EMPATE DEL CORTE */
function detectCutBlock(sortedThirds){
  const cutoffPts = sortedThirds[7].pts;
  const block = sortedThirds.filter(t=>t.pts===cutoffPts).map(t=>t.name);
  return block.length>1 ? block : [];
}

/* UI DE DESEMPATES DE TERCEROS */
function showThirdPlaceTiebreakUI(block){
  let html=`<h2>Desempate entre 3º clasificados</h2>
            <p>Han empatado por las últimas plazas:</p>
            <b>${block.join(", ")}</b><br><br>`;

  if(block.length===2){
    html+=`
      ¿Quién queda por encima?<br>
      <select id="third_cut_0">
        <option value="${block[0]}">${block[0]}</option>
        <option value="${block[1]}">${block[1]}</option>
      </select><br><br>
    `;
  } else {
    html+="Define el orden completo:<br>";
    block.forEach((t,pos)=>{
      html+=`
        Posición ${pos+1}:
        <select class="third-tie" id="third_cut_${pos}">
          <option value="">-</option>
          ${block.map(x=>`<option value="${x}">${x}</option>`).join("")}
        </select><br>
      `;
    });
  }

  html+=`<button onclick="applyThirdCutTiebreak('${block.join("|")}')">Resolver Desempate de 3º</button>`;

  document.getElementById("bracket").innerHTML=html;

  enforceThirdUnique();
}

/* APLICAR DESEMPATE DEL CORTE */
function applyThirdCutTiebreak(blockStr){
  const block=blockStr.split("|");
  let order=[];

  if(block.length===2){
    const winner=document.getElementById("third_cut_0").value;
    const loser=block.find(t=>t!==winner);
    order=[winner,loser];
  } else {
    for(let i=0;i<block.length;i++){
      const v=document.getElementById("third_cut_"+i).value;
      if(!v){ alert("Faltan posiciones."); return; }
      order.push(v);
    }
  }

  const sorted = window.thirdsBeforeCut.slice();

  const rest = sorted.filter(t=>!block.includes(t.name));

  const reconstructed=[];
  sorted.forEach(t=>{ if(!block.includes(t.name)) reconstructed.push(t); });
  order.forEach(name=>{
    reconstructed.push(sorted.find(t=>t.name===name));
  });

  reconstructed.sort((a,b)=>{
    if(a.pts!==b.pts) return b.pts-a.pts;
    return 0;
  });

  const top8 = reconstructed.slice(0,8).map(t=>t.name);

  displayBracket(window.directQualified.concat(top8));
}

/* ─────────────────────────────────────────────
   9) DETECTORES ÚNICOS DE SELECTORES
────────────────────────────────────────────── */

function enforceUniqueOrder(){
  const selects=document.querySelectorAll(".tie-select");
  selects.forEach(s=> s.addEventListener("change",()=>{
    const parent=s.parentNode.parentNode;
    const all=[...parent.querySelectorAll(".tie-select")];
    const values=all.map(x=>x.value).filter(v=>v);
    const dup=values.filter((v,i)=> values.indexOf(v)!==i);
    if(dup.length){ alert("Cada equipo solo puede aparecer una vez."); s.value=""; }
  }));
}

function enforceThirdUnique(){
  const selects=document.querySelectorAll(".third-tie");
  selects.forEach(s=> s.addEventListener("change",()=>{
    const parent=s.parentNode.parentNode;
    const all=[...parent.querySelectorAll(".third-tie")];
    const values=all.map(x=>x.value).filter(v=>v);
    const dup=values.filter((v,i)=> values.indexOf(v)!==i);
    if(dup.length){ alert("Cada equipo una sola vez."); s.value=""; }
  }));
}

/* ─────────────────────────────────────────────
   10) MOSTRAR CLASIFICACIONES Y BRACKET
────────────────────────────────────────────── */

function showStandings(table){
  let html="<h2>Clasificación por Grupos</h2>";
  for(const g in table){
    html+=`<h3>Grupo ${g}</h3>`;
    html+=`
      <table border="1" cellpadding="5">
        <tr><th>Pos</th><th>Equipo</th><th>Puntos</th></tr>
        ${table[g].map(t=>
          `<tr><td>${t.pos}</td><td>${t.name}</td><td>${t.pts}</td></tr>`
        ).join("")}
      </table><br>
    `;
  }
  document.getElementById("standings").innerHTML=html;
}

function displayBracket(arr){
  document.getElementById("bracket").innerHTML=
    "<h2>32 Clasificados → Bracket de Eliminación</h2><pre>"+
    JSON.stringify(arr,null,2)+
    "</pre>";
}

</script>
