<!DOCTYPE html>
<html>
<head>
  <title>Porra Mundial 2026</title>
  <style>
    body { font-family: Arial; background: #f0f8ff; padding: 20px; }
    h1 { color: #006400; text-align: center; }
    .group { border: 1px solid #ccc; padding: 15px; margin: 15px 0; border-radius: 10px; background: #fff; }
    .match { display: flex; align-items: center; justify-content: center; margin: 10px 0; gap: 15px; }
    .team { display: flex; align-items: center; }
    .team img { width: 24px; margin-right: 5px; }
    .date { width: 100%; text-align: center; font-size: 0.9em; color: #333; margin-bottom: 5px; }
    input { width: 50px; padding: 5px; text-align: center; }
    button { display: block; margin: 20px auto; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 8px; border: none; background: #008000; color: white; }
    button:hover { opacity: 0.8; }
    #bracket { margin-top: 25px; white-space: pre-wrap; font-family: monospace; text-align: center; }
  </style>
</head>
<body>
<h1>Porra Mundial 2026 ⚽</h1>
<input id="username" placeholder="Tu nombre" style="display:block; margin:0 auto 20px auto;"><br>

<div id="groups"></div>

<button onclick="calculateQualified()">Calcular Clasificados → Bracket</button>

<div id="bracket"></div>

<script>
// Equipos por grupo
const groups = {
"A":[{name:"México", flag:"https://flagcdn.com/w20/mx.png"},{name:"Sudáfrica", flag:"https://flagcdn.com/w20/za.png"},{name:"Corea del Sur", flag:"https://flagcdn.com/w20/kr.png"},{name:"República Checa", flag:"https://flagcdn.com/w20/cz.png"}],
"B":[{name:"Canadá", flag:"https://flagcdn.com/w20/ca.png"},{name:"Bosnia y Herzegovina", flag:"https://flagcdn.com/w20/ba.png"},{name:"Catar", flag:"https://flagcdn.com/w20/qa.png"},{name:"Suiza", flag:"https://flagcdn.com/w20/ch.png"}],
"C":[{name:"Brasil", flag:"https://flagcdn.com/w20/br.png"},{name:"Marruecos", flag:"https://flagcdn.com/w20/ma.png"},{name:"Haití", flag:"https://flagcdn.com/w20/ht.png"},{name:"Escocia", flag:"https://flagcdn.com/w20/gb-sct.png"}],
"D":[{name:"EEUU", flag:"https://flagcdn.com/w20/us.png"},{name:"Paraguay", flag:"https://flagcdn.com/w20/py.png"},{name:"Australia", flag:"https://flagcdn.com/w20/au.png"},{name:"Turquía", flag:"https://flagcdn.com/w20/tr.png"}],
"E":[{name:"Alemania", flag:"https://flagcdn.com/w20/de.png"},{name:"Curaçao", flag:"https://flagcdn.com/w20/cw.png"},{name:"Costa de Marfil", flag:"https://flagcdn.com/w20/ci.png"},{name:"Ecuador", flag:"https://flagcdn.com/w20/ec.png"}],
"F":[{name:"Países Bajos", flag:"https://flagcdn.com/w20/nl.png"},{name:"Japón", flag:"https://flagcdn.com/w20/jp.png"},{name:"Suecia", flag:"https://flagcdn.com/w20/se.png"},{name:"Túnez", flag:"https://flagcdn.com/w20/tn.png"}],
"G":[{name:"Bélgica", flag:"https://flagcdn.com/w20/be.png"},{name:"Egipto", flag:"https://flagcdn.com/w20/eg.png"},{name:"Irán", flag:"https://flagcdn.com/w20/ir.png"},{name:"Nueva Zelanda", flag:"https://flagcdn.com/w20/nz.png"}],
"H":[{name:"España", flag:"https://flagcdn.com/w20/es.png"},{name:"Cabo Verde", flag:"https://flagcdn.com/w20/cv.png"},{name:"Arabia Saudita", flag:"https://flagcdn.com/w20/sa.png"},{name:"Uruguay", flag:"https://flagcdn.com/w20/uy.png"}],
"I":[{name:"Francia", flag:"https://flagcdn.com/w20/fr.png"},{name:"Senegal", flag:"https://flagcdn.com/w20/sn.png"},{name:"Irak", flag:"https://flagcdn.com/w20/iq.png"},{name:"Noruega", flag:"https://flagcdn.com/w20/no.png"}],
"J":[{name:"Argentina", flag:"https://flagcdn.com/w20/ar.png"},{name:"Argelia", flag:"https://flagcdn.com/w20/dz.png"},{name:"Austria", flag:"https://flagcdn.com/w20/at.png"},{name:"Jordania", flag:"https://flagcdn.com/w20/jo.png"}],
"K":[{name:"Portugal", flag:"https://flagcdn.com/w20/pt.png"},{name:"República Democrática del Congo", flag:"https://flagcdn.com/w20/cd.png"},{name:"Uzbekistán", flag:"https://flagcdn.com/w20/uz.png"},{name:"Colombia", flag:"https://flagcdn.com/w20/co.png"}],
"L":[{name:"Inglaterra", flag:"https://flagcdn.com/w20/gb-eng.png"},{name:"Croacia", flag:"https://flagcdn.com/w20/hr.png"},{name:"Ghana", flag:"https://flagcdn.com/w20/gh.png"},{name:"Panamá", flag:"https://flagcdn.com/w20/pa.png"}]
};

// Fechas por jornada según grupo
const dates = {
  "A": ["2026-06-11","2026-06-18","2026-06-24"],
  "B": ["2026-06-12","2026-06-18","2026-06-24"],
  "C": ["2026-06-13","2026-06-19","2026-06-24"],
  "D": ["2026-06-13","2026-06-19","2026-06-25"],
  "E": ["2026-06-14","2026-06-20","2026-06-25"],
  "F": ["2026-06-14","2026-06-20","2026-06-25"],
  "G": ["2026-06-15","2026-06-21","2026-06-26"],
  "H": ["2026-06-15","2026-06-21","2026-06-26"],
  "I": ["2026-06-16","2026-06-22","2026-06-26"],
  "J": ["2026-06-16","2026-06-22","2026-06-26"],
  "K": ["2026-06-17","2026-06-23","2026-06-27"],
  "L": ["2026-06-17","2026-06-23","2026-06-27"]
};

// Generar partidos con fechas
const matches = [];
for(const g in groups){
  const t = groups[g];
  matches.push({group:g, date:dates[g][0], home:t[0], away:t[1]});
  matches.push({group:g, date:dates[g][0], home:t[2], away:t[3]});
  matches.push({group:g, date:dates[g][1], home:t[0], away:t[2]});
  matches.push({group:g, date:dates[g][1], home:t[3], away:t[1]});
  matches.push({group:g, date:dates[g][2], home:t[3], away:t[0]});
  matches.push({group:g, date:dates[g][2], home:t[1], away:t[2]});
}

matches.sort((a,b) => new Date(a.date) - new Date(b.date));

// Crear HTML centrado
const container = document.getElementById("groups");
let currentGroup="";
matches.forEach(m => {
  if(m.group!==currentGroup){
    currentGroup = m.group;
    const div = document.createElement("div");
    div.id = "group_"+currentGroup;
    div.className = "group";
    div.innerHTML = `<h2 style="text-align:center;">Grupo ${currentGroup}</h2>`;
    container.appendChild(div);
  }
  const matchId = m.group + "_" + m.home.name.replace(/\s/g,'') + "_" + m.away.name.replace(/\s/g,'');
  document.getElementById("group_"+currentGroup).innerHTML += `
    <div class="match">
      <div class="team"><img src="${m.home.flag}">${m.home.name}</div>
      <input type="number" id="${matchId}_scoreA" min="0" placeholder="0">
      <span>-</span>
      <input type="number" id="${matchId}_scoreB" min="0" placeholder="0">
      <div class="team"><img src="${m.away.flag}">${m.away.name}</div>
    </div>
    <div class="date">${m.date}</div>
  `;
});

// Funciones de cálculo (igual que antes)
function calculateQualified(){
  const qualified = [];
  const thirdPlaces = [];
  for(const g in groups){
    const teams = groups[g];
    const points={}, gf={}, ga={};
    teams.forEach(t=>{points[t.name]=0; gf[t.name]=0; ga[t.name]=0;});
    teams.forEach((A,i)=>{
      teams.forEach((B,j)=>{ if(j>i){
        const id = g+"_"+A.name.replace(/\s/g,'')+"_"+B.name.replace(/\s/g,'');
        const sA=parseInt(document.getElementById(id+"_scoreA").value)||0;
        const sB=parseInt(document.getElementById(id+"_scoreB").value)||0;
        gf[A.name]+=sA; ga[A.name]+=sB;
        gf[B.name]+=sB; ga[B.name]+=sA;
        if(sA>sB) points[A.name]+=3;
        else if(sB>sA) points[B.name]+=3;
        else {points[A.name]++; points[B.name]++;}
      }});
    });
    const sorted = teams.slice().sort((a,b)=>points[b.name]-points[a.name] || (gf[b.name]-ga[b.name])-(gf[a.name]-ga[a.name]));
    qualified.push(sorted[0].name,sorted[1].name);
    thirdPlaces.push({name:sorted[2].name, pts:points[sorted[2].name], diff:gf[sorted[2].name]-ga[sorted[2].name]});
  }
  thirdPlaces.sort((a,b)=>b.pts-a.pts || b.diff-a.diff);
  const top8 = thirdPlaces.slice(0,8).map(t=>t.name);
  displayBracket(qualified.concat(top8));
}

function displayBracket(arr){
  document.getElementById("bracket").innerHTML = "<h2>32 Clasificados → Bracket de Eliminación</h2><pre>"+JSON.stringify(arr,null,2)+"</pre>";
}
</script>
</body>
</html>
